{% extends 'layout.html' %}
{% block body %}
 <main>
 <section class="d-flex align-items-center my-5 mt-lg-6 mb-lg-5">
            <div class="container">
                    <div class="col-12 d-flex align-items-center justify-content-center">
                        <div class="bg-white shadow-soft border rounded border-light p-4 p-lg-5 w-100 fmxw-650">
                            <div class="text-center text-md-center mb-4 mt-md-0">
                                <h1 class="mb-0 h3">Sign in to our platform</h1>
                                {% if error %}
                                <div class="alert alert-danger mt-3" role="alert">
                                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                                </div>
                                {% endif %}
                            </div>
							<img src="{{ url_for('static', filename='secure_login.png') }}">
              <div class="card-body">
                            <form action="" method="POST" class="mt-4">
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <div class="input-group mb-4">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text"><span class="fas fa-envelope"></span></span>
                                        </div>
									<input name="email" class="form-control" placeholder="example@company.com" type="text" required>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <div class="form-group">
                                        <label for="password">Password</label>
                                        <div class="input-group mb-4">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><span class="fas fa-unlock-alt"></span></span>
                                            </div>
									<input name="password" type="text" class="form-control" placeholder="Password" style="-webkit-text-security:disc;" aria-label="Password" required>                                        </div>
                                </div>
                                </div>

                                    <div class="form-group">
                                        <label class="my-1 mr-2" for="inlineFormCustomSelectPref">Choose User Type</label>
                                        <select class="custom-select my-1 mr-sm-2" id="inlineFormCustomSelectPref" name="user_type" required>
                                            <option value="student">Student</option>
                                            <option value="teacher">Professor</option>
                                        </select>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Take a Photo for Verification</label>
                                        <div id="camera-status" class="alert alert-info py-2" style="font-size: 0.9rem;">
                                            <i class="fas fa-spinner fa-spin"></i> Initializing camera...
                                        </div>
                                        <select id="cameraSelect" class="form-control mb-2" style="display:none;">
                                            <option value="">Select Camera...</option>
                                        </select>
                                        <video id="stream" width="370" height="320" autoplay playsinline style="border-radius: 8px; background: #000;"></video>
                                        <canvas id="capture" width="370" height="320" style="display: none;"></canvas>
                                        <br><br>
                                        <button id="btn-capture" type="button" class="btn btn-primary justify-content-center" disabled>
                                            <i class="fas fa-camera"></i> Capture Image
                                        </button>
                                        <button id="btn-switch-camera" type="button" class="btn btn-secondary justify-content-center ml-2" style="display:none;">
                                            <i class="fas fa-sync-alt"></i> Switch Camera
                                        </button>
                                        <br><br>
                                        <div id="snapshot"></div>
                                        <input type="hidden" id="image_hidden" name="image_hidden">
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center mb-4">
                                        <div><a href="/lostpassword" class="font-weight-bold">Lost password?</a></div>
                                </div>
                            <button type="submit" class="btn btn-block btn-primary">Sign in</button>
                        </form>
             
                        <div class="d-block d-sm-flex justify-content-center align-items-center mt-4">
                            <span class="font-weight-normal">
                                Not registered?
                             <a href="/register" class="font-weight-bold">Create account</a>
                            </span>
                        </div>
              </div>
  </div>
  <div>
  </div>
</div>
</section>
</main>
<script>
    var btnCapture = document.getElementById("btn-capture");
    var btnSwitchCamera = document.getElementById("btn-switch-camera");
    var stream = document.getElementById("stream");
    var capture = document.getElementById("capture");
    var snapshot = document.getElementById("snapshot");
    var cameraStatus = document.getElementById("camera-status");
    var cameraSelect = document.getElementById("cameraSelect");
    var cameraStream = null;
    var currentCameraIndex = 0;
    var availableCameras = [];
    
    btnCapture.addEventListener( "click", captureSnapshot );
    btnSwitchCamera.addEventListener( "click", switchCamera );
    cameraSelect.addEventListener( "change", function() {
        if (this.value) {
            startStreamingWithDevice(this.value);
        }
    });

    function getCameras() {
        navigator.mediaDevices.enumerateDevices()
        .then(function(devices) {
            availableCameras = devices.filter(function(device) {
                return device.kind === 'videoinput';
            });
            
            if (availableCameras.length > 1) {
                cameraSelect.style.display = 'block';
                btnSwitchCamera.style.display = 'inline-block';
                cameraSelect.innerHTML = '<option value="">Select Camera...</option>';
                
                availableCameras.forEach(function(device, index) {
                    var option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || 'Camera ' + (index + 1);
                    cameraSelect.appendChild(option);
                });
                
                console.log("Found " + availableCameras.length + " camera(s)");
            } else if (availableCameras.length === 1) {
                console.log("Found 1 camera");
            }
        })
        .catch(function(err) {
            console.error("Error enumerating devices: " + err);
        });
    }

    function startStreamingWithDevice(deviceId) {
        var constraints = {
            video: {
                deviceId: deviceId ? { exact: deviceId } : undefined,
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        };
        
        if (cameraStream) {
            cameraStream.getTracks().forEach(function(track) {
                track.stop();
            });
        }
        
        navigator.mediaDevices.getUserMedia(constraints)
        .then( function( mediaStream ) {
          cameraStream = mediaStream;
          stream.srcObject = mediaStream;
          stream.play();
          btnCapture.disabled = false;
          cameraStatus.className = 'alert alert-success py-2';
          cameraStatus.style.fontSize = '0.9rem';
          cameraStatus.innerHTML = '<i class="fas fa-check-circle"></i> Camera ready! Click "Capture Image" to take a photo.';
          console.log("✓ Camera loaded successfully");
        })
        .catch( function( err ) {
          console.error( "Camera error: " + err );
          cameraStatus.className = 'alert alert-danger py-2';
          cameraStatus.style.fontSize = '0.9rem';
          cameraStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Unable to access camera. Please check permissions and reload.';
          btnCapture.disabled = true;
        });
    }

    function startStreaming() {
      var mediaSupport = 'mediaDevices' in navigator;
    
      if( mediaSupport && null == cameraStream ) {
        var constraints = {
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        };
        
        navigator.mediaDevices.getUserMedia(constraints)
        .then( function( mediaStream ) {
          cameraStream = mediaStream;
          stream.srcObject = mediaStream;
          stream.play();
          btnCapture.disabled = false;
          cameraStatus.className = 'alert alert-success py-2';
          cameraStatus.style.fontSize = '0.9rem';
          cameraStatus.innerHTML = '<i class="fas fa-check-circle"></i> Camera ready! Click "Capture Image" to take a photo.';
          console.log("✓ Camera loaded successfully");
          getCameras();
        })
        .catch( function( err ) {
          console.error( "Camera error: " + err );
          cameraStatus.className = 'alert alert-danger py-2';
          cameraStatus.style.fontSize = '0.9rem';
          cameraStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Unable to access camera. Please check permissions and reload.';
          btnCapture.disabled = true;
        });
      }
      else if (!mediaSupport) {
        cameraStatus.className = 'alert alert-danger py-2';
        cameraStatus.style.fontSize = '0.9rem';
        cameraStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Camera not supported in this browser.';
      }
    }
    
    function switchCamera() {
        if (availableCameras.length > 1) {
            currentCameraIndex = (currentCameraIndex + 1) % availableCameras.length;
            var nextCamera = availableCameras[currentCameraIndex];
            cameraSelect.value = nextCamera.deviceId;
            startStreamingWithDevice(nextCamera.deviceId);
        }
    }
    
    function stopStreaming() {
      if( null != cameraStream ) {
        var tracks = cameraStream.getTracks();
        tracks.forEach(function(track) {
            track.stop();
        });
        stream.load();
        cameraStream = null;
      }
    }
    
    function captureSnapshot() {
      if( null != cameraStream ) {
        var ctx = capture.getContext( '2d' );
        var img = new Image();
        ctx.drawImage( stream, 0, 0, capture.width, capture.height );
        img.src = capture.toDataURL( "image/png" );
        img.width = 370;
        img.height = 320;
        var d1 = capture.toDataURL("image/png");
        var res = d1.replace("data:image/png;base64,", "");
        console.log("✓ Image captured successfully");
        snapshot.innerHTML = '';
        snapshot.appendChild( img );
        document.getElementById("image_hidden").value = res;
        cameraStatus.className = 'alert alert-success py-2';
        cameraStatus.style.fontSize = '0.9rem';
        cameraStatus.innerHTML = '<i class="fas fa-check-circle"></i> Photo captured successfully! You can now sign in.';
      }
    }
    
    window.onload = function() {
       startStreaming();
    }
    
    window.onbeforeunload = function() {
       stopStreaming();
    }
    </script>
{% endblock %}
